<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Individual Report Cards - {{ class_label(class_name) }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f7f7f7;
            color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .page-wrap {
            max-width: 900px;
            margin: 30px auto;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 24px;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sub {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .table th,
        .table td {
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
            <div class="title">Individual Report Cards</div>
            <div class="sub">{{ class_label(class_name) }} · Select a student to open one report card</div>
        </div>
        <a href="{{ url_for('results_center') }}" class="btn btn-outline-secondary btn-sm">Back</a>
    </div>

    <div class="actions">
        <a href="{{ url_for('report_cards_bulk', class_name=class_name) }}" target="_blank" class="btn btn-dark btn-sm">Open Bulk Report Cards</a>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-sm align-middle">
            <thead class="table-light">
                <tr>
                    <th style="width: 120px;">Roll No</th>
                    <th>Student Name</th>
                    <th style="width: 180px;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for r in results %}
                <tr>
                    <td>{{ r.roll_no }}</td>
                    <td>{{ r.name }}</td>
                    <td>
                        <a href="{{ url_for('report_card_individual', class_name=class_name, student_id=r.id) }}" target="_blank" class="btn btn-primary btn-sm">Open Report Card</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
