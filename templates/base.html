<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PHS Portal{% endblock %}</title>
    <!-- Preconnect hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome solid-only subset (saves ~60KB vs all.min.css) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/solid.min.css">
    <!-- Fonts — single request for all families -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='phs.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
{% if portal_locked and not admin_unlocked %}
<div class="phs-lock-banner"><i class="fas fa-lock" title="Portal is locked — mark entry disabled"></i> Portal is currently locked — Mark entry and editing are disabled for all classes.</div>
{% endif %}
{% block body %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Auto-dismiss flash alerts after 5 seconds
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.alert-dismissible').forEach(function (el) {
            setTimeout(function () {
                el.style.transition = 'opacity 0.5s ease, margin 0.5s ease, padding 0.5s ease';
                el.style.opacity = '0';
                setTimeout(function() {
                    var bsAlert = bootstrap.Alert.getOrCreateInstance(el);
                    if (bsAlert) bsAlert.close();
                }, 500);
            }, 5000);
        });
    });
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
